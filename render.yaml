services:
  - type: worker
    name: music-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m AviaxMusic
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_DB_URI
        sync: false
      - key: OWNER_ID
        sync: false
      - key: LOG_GROUP_ID
        sync: false
      - key: STRING_SESSION
        sync: false
      - key: STRING_SESSION2
        sync: false
      - key: STRING_SESSION3
        sync: false
      - key: STRING_SESSION4
        sync: false
      - key: STRING_SESSION5
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: PORT
        value: "8080"
